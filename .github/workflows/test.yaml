name: Pytest

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Set up Python
              run: uv python install 3.13

            - name: Sync deps
              run: make install

            - name: Run Pytest
              run: make test
